version: 2

principle: your task system routes work; this bridge only selects a Codex profile.

dispatch_default:
  profile: C2
  provider: antigravity
  model: gemini-3.1-pro-high
  fallback: forbidden

dispatch_providers:
  antigravity:
    command: agy
    supported: true
  claude:
    command: claude
    supported: true

workers:
  C1:
    name: tbhrc Login
    use_for:
      - production implementation
      - hardening
      - integrations
      - test fixes
  C2:
    name: David Login
    use_for:
      - continuing original-profile work
      - preserving existing projects and task history
      - general investigation and implementation
      - independent review
      - default dispatch profile

constraints:
  task_workspace_is_source_of_truth: true
  automatic_account_rotation: false
  external_write_requires_human_approval: true
  auth_json_never_enters_repo: true
