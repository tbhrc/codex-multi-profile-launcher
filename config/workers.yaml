version: 2

manager:
  id: Larry
  name: Larry
  runtime: Claude Code
  source_of_truth: /path/to/your/task-workspace

workers:
  - id: C1
    name: tbhrc Login
    runtime: codex
    codex_home: ~/.codex-business
    primary_roles:
      - production_builder
      - hardening_worker
      - integration_worker
    max_concurrent_tasks: 1

  - id: C2
    name: David Login
    runtime: codex
    codex_home: ~/.codex
    primary_roles:
      - original_profile_worker
      - continuity_worker
      - reviewer
      - reviewer
    max_concurrent_tasks: 1

dispatch:
  default_profile: C2
  default_provider: antigravity
  providers:
    - id: antigravity
      command: agy
      default_model: gemini-3.1-pro-high
    - id: claude
      command: claude
      default_model: claude-sonnet-4-6
